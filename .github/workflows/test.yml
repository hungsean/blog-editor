name: test

# backend 測試安全網（#01.1）：push 與 PR 時自動跑 bun test。
# 測試失敗才紅燈；覆蓋率僅以 text reporter 印出摘要供 review 參考，不設門檻、不擋 PR。
on:
  push:
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('backend/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 單一入口：本地與 CI 都跑 test:coverage（bun test --coverage --coverage-reporter=text）。
      # 測試失敗會讓 step 非零退出而擋 PR；覆蓋率數字只印在 log，不影響成敗。
      - name: Run tests with coverage
        run: bun run test:coverage
