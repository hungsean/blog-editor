services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      DB_PATH: /data/blog-editor.db
    volumes:
      - blog-editor-data:/data

  frontend:
    build: ./frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  blog-editor-data:
