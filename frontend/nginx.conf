server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Backend API — reverse proxied to the backend service over the compose network.
    # proxy_pass has no URI, so the original /api/... path is forwarded as-is.
    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # image uploads can be large; translation/publish can be slow
        client_max_body_size 25m;
        proxy_read_timeout 300s;
    }

    # Hashed Vite build assets — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — wouter handles client-side routing (e.g. /editor/:id).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
